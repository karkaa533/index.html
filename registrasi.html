<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krka Orbit - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --planetary: #334EAC;
            --universe: #7096D1;
            --milky-way: #FFF9F0;
            --venus: #BAD6EB;
            --meteor: #F7F2EB;
            --galaxy: #081F5C;
            --sky: #D0E3FF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--galaxy), var(--planetary));
            color: var(--milky-way);
            min-height: 100vh;
        }

        /* RUNNING TEXT ATAS */
        .marquee-wrapper {
            background-color: var(--sky);
            color: var(--galaxy);
            font-size: 14px;
            font-weight: bold;
            padding: 10px 0;
            letter-spacing: 1px;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(8, 31, 92, 0.7);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--universe);
        }

        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--venus);
        }

        .nav-links a {
            text-decoration: none;
            color: var(--milky-way);
            font-size: 15px;
            font-weight: 600;
            margin-left: 15px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background-color: var(--universe);
            color: var(--galaxy);
        }

        /* REGISTRATION CONTAINER */
        .regis-container {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .regis-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .regis-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            color: var(--venus);
            margin: 0;
        }

        .regis-header p {
            color: var(--universe);
            margin-top: 10px;
        }

        /* FORM BOX */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--universe);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--sky);
            font-size: 0.9rem;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(112, 150, 209, 0.3);
            background: rgba(8, 31, 92, 0.5);
            color: var(--milky-way);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--venus);
            box-shadow: 0 0 10px rgba(186, 214, 235, 0.3);
            background: rgba(8, 31, 92, 0.8);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--planetary), var(--universe));
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(51, 78, 172, 0.4);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; }
            .nav-links a { margin: 5px; display: inline-block; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .regis-container { margin: 30px auto; }
            .form-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <marquee scrollamount="6">🌌 SPACE ENROLLMENT — JOIN THE ORBIT COMMUNITY TODAY AND START YOUR JOURNEY 🚀</marquee>
    </div>

    <nav>
        <div class="nav-logo">🌀 Karkirkur</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cv.html">CV</a>
            <a href="gallery.html">Gallery</a>
            <a href="kontak.html">Contact</a>
            <a href="registrasi.html" class="active">Registration</a>
        </div>
    </nav>

    <div class="regis-container">
        <div class="regis-header">
            <h1>Join Orbit Hub</h1>
            <p>Please fill out the form below to register yourself in our tech and sports community.</p>
        </div>

        <div class="form-card">
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="0812-xxxx-xxxx" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="major">Major</label>
                        <select id="major" name="major">
                            <option value="tkj">Network Engineering (TKJ)</option>
                            <option value="rpl">Software Engineering (RPL)</option>
                            <option value="other">Other Majors</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="interest">Core Interest</label>
                        <select id="interest" name="interest">
                            <option value="networking">Networking & Servers</option>
                            <option value="hardware">Hardware & Assembly</option>
                            <option value="football">Football / Futsal</option>
                            <option value="all">All of the Above</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Reason for Joining</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell us why you want to join..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Registration</button>
            </form>
        </div>
    </div>

</body>
</html>
